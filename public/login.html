<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Descuento Obsitel</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-body">

  <div class="login-overlay">
    <div class="login-card">
      <h1 class="login-logo">Descuento Obsitel</h1>
      <h2 class="login-titulo" id="auth-titulo">Iniciar sesión</h2>

      <div id="auth-error" class="login-error" style="display:none;"></div>

      <input type="text" id="login-email" placeholder="Correo electrónico" autocomplete="username">
      <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password">

      <button class="accion login-btn-principal" id="btn-auth-principal" onclick="loginConCorreo()">Ingresar</button>

      <div class="login-separador"><span>o</span></div>

      <button class="login-btn-google" onclick="loginConGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35.5 24 35.5c-6.9 0-12.5-5.6-12.5-12.5S17.1 10.5 24 10.5c3.2 0 6.1 1.2 8.3 3.2l6-6C34.9 4.4 29.7 2.5 24 2.5 12.4 2.5 3 11.9 3 23.5S12.4 44.5 24 44.5c11 0 21-8 21-21 0-1.4-.1-2.8-.4-4z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.4 18.9 12.5 24 12.5c3.2 0 6.1 1.2 8.3 3.2l6-6C34.9 4.4 29.7 2.5 24 2.5c-7.7 0-14.4 4.3-17.7 10.6z"/>
          <path fill="#4CAF50" d="M24 44.5c5.6 0 10.7-1.9 14.7-5.1l-6.8-5.6c-2 1.4-4.7 2.2-7.9 2.2-5.3 0-9.7-3.1-11.3-7.6l-6.7 5.1C9.5 40.1 16.2 44.5 24 44.5z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.4l6.8 5.6C41.9 36 44 30.2 44 23.5c0-1.4-.1-2.8-.4-4z"/>
        </svg>
        Continuar con Google
      </button>

      <div class="login-toggle" id="btn-auth-toggle" onclick="alternarModoAuth()">
        ¿No tienes cuenta? Regístrate
      </div>
    </div>
  </div>

  <!-- Firebase SDK (compat, sin build step) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="/js/firebaseConfig.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
